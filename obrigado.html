<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pedido recebido | AI Office™</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:linear-gradient(135deg,#2563EB,#102A43);color:#1F2937}
    main{width:min(620px,100%);background:white;border-radius:24px;padding:44px;box-shadow:0 24px 70px rgba(0,0,0,.2);text-align:center}
    .mark{width:64px;height:64px;margin:0 auto 20px;border-radius:50%;display:grid;place-items:center;background:#DCFCE7;color:#166534;font-size:30px;font-weight:900}
    h1{color:#102A43;font-size:38px;margin:0 0 14px}
    p{color:#64748B;font-size:18px}
    a{display:inline-block;margin-top:18px;padding:14px 22px;border-radius:12px;background:#2563EB;color:white;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main>
    <div class="mark">✓</div>
    <h1>Pedido recebido.</h1>
    <p>Obrigado pelo contacto. A informação foi enviada com sucesso e será analisada para preparar a resposta.</p>
    <a href="/">Voltar à AI Office™</a>
  </main>
</body>
</html>
